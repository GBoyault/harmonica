<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="ne/pas/regarder/dans/ce/dossier/css/app.css">
  <title> ** SUPER BLUES HARP SIMULATOR 2022 **</title>
  <meta name="robots" content="noindex">
  <meta name="googlebot" content="noindex">
</head>

<body>
  <div class="main-wrapper" id="main-wrapper">
    <sidebar class="sidebar">
      <div class="heading">
        <h1>
          <span class="word word-1">Super</span>
          <span class="word word-2">Blues Harp</span>
          <span class="word word-3">simulator</span>
          <span class="word word-4">2022</span>
        </h1>
      </div>
      <div class="instructions">
        <div class="instruction">
            <span class="key">R</span> <span class="result">blow</span>
        </div>
        <div class="instruction">
            <span class="key">R</span><span class="key">E</span> <span class="result">blow + bend</span>
        </div>
        <div class="instruction">
            <span class="key">R</span><span class="key">E</span><span class="key">Z</span> <span class="result">blow + bend^2</span>
        </div>
        <div class="instruction instruction--mt">
            <span class="key">F</span> <span class="result">draw</span>
        </div>
        <div class="instruction">
            <span class="key">F</span><span class="key">D</span> <span class="result">draw + bend</span>
        </div>
        <div class="instruction">
            <span class="key">F</span><span class="key">D</span><span class="key">S</span> <span class="result">draw + bend^2</span>
        </div>
        <div class="instruction">
            <span class="key">F</span><span class="key">D</span><span class="key">S</span><span class="key">Q</span> <span class="result">draw + bend^3</span>
        </div>
      </div>
      <div id="stats">
        <div class="stat"><span class="label">keys</span><span class="value" id="keys">-</span></div>
        <div class="stat"><span class="label">hole</span><span class="value" id="hole">-</span></div>
        <div class="stat"><span class="label">air</span><span class="value" id="air">-</span></div>
        <div class="stat"><span class="label">note</span><span class="value" id="note">-</span></div>
        <div class="stat"><span class="label">freq</span><span class="value" id="freq">-</span></div>
        <div class="stat"><span class="label">tuning</span><span class="value" id="tuning">-</span></div>
      </div>
    </sidebar>

    <main class="scene">
      <img src="ne/pas/regarder/dans/ce/dossier/img/background.png" alt="" class="background">
      <div id="harmonica">
        <div class="inner">
          <div class="hole" data-hole="1">
            <div class="nb">1</div>
          </div>
          <div class="hole" data-hole="2">
            <div class="nb">2</div>
          </div>
          <div class="hole" data-hole="3">
            <div class="nb">3</div>
          </div>
          <div class="hole" data-hole="4">
            <div class="nb">4</div>
          </div>
          <div class="hole" data-hole="5">
            <div class="nb">5</div>
          </div>
          <div class="hole" data-hole="6">
            <div class="nb">6</div>
          </div>
          <div class="hole" data-hole="7">
            <div class="nb">7</div>
          </div>
          <div class="hole" data-hole="8">
            <div class="nb">8</div>
          </div>
          <div class="hole" data-hole="9">
            <div class="nb">9</div>
          </div>
          <div class="hole" data-hole="10">
            <div class="nb">10</div>
          </div>
        </div>
      </div>

      <div id="mouth">
        <div class="hole"></div>
      </div>
    </main>
  </div>

  <script src="ne/pas/regarder/dans/ce/dossier/js/app.js"></script>
</body>

</html>
